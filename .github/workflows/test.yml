name: 'Test'
on:
    push:
        paths:
            - 'src/**'
            - 'test/**'
    pull_request:
    workflow_dispatch:

jobs:
    discover-features:
        runs-on: ubuntu-latest
        outputs:
            features: ${{ steps.discover.outputs.features }}
        steps:
            - uses: actions/checkout@v6

            - name: 'Discover features from test directories'
              id: discover
              run: |
                  node <<'NODE'
                  const fs = require('fs');
                  const path = require('path');

                  const repoRoot = process.cwd();
                  const testRoot = path.join(repoRoot, 'test');
                  const srcRoot = path.join(repoRoot, 'src');
                  const outputPath = process.env.GITHUB_OUTPUT;

                  if (!outputPath) {
                      console.error('GITHUB_OUTPUT is not set.');
                      process.exit(1);
                  }

                  if (!fs.existsSync(testRoot)) {
                      console.error("Missing 'test' directory.");
                      process.exit(1);
                  }

                  const features = fs
                      .readdirSync(testRoot, { withFileTypes: true })
                      .filter((entry) => entry.isDirectory())
                      .map((entry) => entry.name)
                      .sort((a, b) => a.localeCompare(b));

                  if (features.length === 0) {
                      console.error("No feature directories found under 'test/'.");
                      process.exit(1);
                  }

                  const missingFeatureDefs = features.filter((feature) => {
                      const featureDef = path.join(srcRoot, feature, 'devcontainer-feature.json');
                      return !fs.existsSync(featureDef);
                  });

                  if (missingFeatureDefs.length > 0) {
                      console.error(
                          `Missing matching feature definitions for: ${missingFeatureDefs.join(', ')}. Expected each at src/<feature>/devcontainer-feature.json.`,
                      );
                      process.exit(1);
                  }

                  const payload = JSON.stringify(features);
                  fs.appendFileSync(outputPath, `features=${payload}\n`, 'utf8');
                  console.log(`Discovered features: ${payload}`);
                  NODE

    test-autogenerated:
        needs: discover-features
        runs-on: ubuntu-latest
        strategy:
            matrix:
                features: ${{ fromJson(needs.discover-features.outputs.features) }}
                baseImage:
                    - mcr.microsoft.com/devcontainers/base:ubuntu
        steps:
            - uses: actions/checkout@v6

            - name: 'Install latest devcontainer CLI'
              run: npm install -g @devcontainers/cli

            - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
              run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

    test-scenarios:
        needs: discover-features
        runs-on: ubuntu-latest
        strategy:
            matrix:
                features: ${{ fromJson(needs.discover-features.outputs.features) }}
        steps:
            - uses: actions/checkout@v6

            - name: 'Install latest devcontainer CLI'
              run: npm install -g @devcontainers/cli

            - name: "Generating tests for '${{ matrix.features }}' scenarios"
              run: devcontainer features test -f ${{ matrix.features }} --skip-autogenerated --skip-duplicated .
